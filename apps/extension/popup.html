<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walour</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0D1117;
      color: #E6EDF3;
      font-family: 'SF Pro Display', 'Roboto', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid #30363D;
      margin-bottom: 14px;
    }

    .logo {
      color: #00C9A7;
      font-size: 22px;
      line-height: 1;
    }

    .name-block {
      flex: 1;
    }

    .app-name {
      font-size: 15px;
      font-weight: 600;
      color: #E6EDF3;
    }

    .app-version {
      font-size: 11px;
      color: #8B949E;
      margin-top: 1px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #22C55E;
    }

    .status-text {
      font-size: 13px;
      color: #E6EDF3;
    }

    .checks-section {
      margin-bottom: 14px;
    }

    .checks-label {
      font-size: 11px;
      color: #8B949E;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .check-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #161B22;
      font-size: 13px;
    }

    .check-row:last-child {
      border-bottom: none;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
    }

    .footer {
      padding-top: 12px;
      border-top: 1px solid #30363D;
      text-align: center;
    }

    .stats-link {
      color: #00C9A7;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }

    .stats-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">&#x2B21;</span>
    <div class="name-block">
      <div class="app-name" id="walour-name">Walour</div>
      <div class="app-version" id="walour-version">v0.1.0</div>
    </div>
  </div>

  <div class="status-row">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Protection active</span>
  </div>

  <div class="checks-section">
    <div class="checks-label">Active Checks</div>
    <div class="check-row">
      <span>URL / Domain</span>
      <span class="badge" id="badge-url">On</span>
    </div>
    <div class="check-row">
      <span>Token Risk</span>
      <span class="badge" id="badge-token">On</span>
    </div>
    <div class="check-row">
      <span>Transaction Decode</span>
      <span class="badge" id="badge-tx">On</span>
    </div>
  </div>

  <div class="footer">
    <a class="stats-link" id="stats-link" href="https://walour.xyz/stats" target="_blank">
      View protection stats &rarr;
    </a>
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
