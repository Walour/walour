<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Walour — Demo Trigger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D1117;
      color: #E6EDF3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    h1 { font-size: 22px; color: #00C9A7; }
    p { font-size: 14px; color: #8B949E; text-align: center; max-width: 400px; }
    button {
      padding: 14px 32px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #connectBtn { background: #00C9A7; color: #0D1117; }
    #signBtn { background: #EF4444; color: #fff; display: none; }
    #status { font-size: 13px; color: #8B949E; }
  </style>
</head>
<body>
  <h1>Walour Demo Trigger</h1>
  <p>Connect Phantom, then click Sign Transaction to trigger the Walour interceptor.</p>

  <button id="connectBtn">Connect Phantom</button>
  <button id="signBtn">Sign Transaction (triggers Walour)</button>
  <div id="status">Not connected</div>

  <script type="module">
    import { Connection, Transaction, SystemProgram, PublicKey } from 'https://esm.sh/@solana/web3.js@1.98.0'

    const connectBtn = document.getElementById('connectBtn')
    const signBtn = document.getElementById('signBtn')
    const status = document.getElementById('status')

    let walletPubkey = null

    connectBtn.addEventListener('click', async () => {
      try {
        const provider = window.phantom?.solana
        if (!provider) {
          status.textContent = 'Phantom not found — install the extension first'
          return
        }
        const resp = await provider.connect()
        walletPubkey = resp.publicKey.toString()
        status.textContent = `Connected: ${walletPubkey.slice(0, 6)}...${walletPubkey.slice(-4)}`
        connectBtn.style.display = 'none'
        signBtn.style.display = 'block'
      } catch (e) {
        status.textContent = `Error: ${e.message}`
      }
    })

    signBtn.addEventListener('click', async () => {
      try {
        status.textContent = 'Building transaction...'
        const provider = window.phantom?.solana
        const connection = new Connection('https://api.devnet.solana.com', 'confirmed')

        const { blockhash } = await connection.getLatestBlockhash()

        // Transfer to a known drainer address — triggers RED on the transaction row
        const DRAINER = 'Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS'
        const tx = new Transaction({
          recentBlockhash: blockhash,
          feePayer: new PublicKey(walletPubkey),
        }).add(
          SystemProgram.transfer({
            fromPubkey: new PublicKey(walletPubkey),
            toPubkey: new PublicKey(DRAINER),
            lamports: 1_000_000,
          })
        )

        status.textContent = 'Sending to Walour interceptor...'
        // This call is intercepted by the Walour content script
        await provider.signTransaction(tx)
        status.textContent = 'Signed (or blocked by Walour)'
      } catch (e) {
        status.textContent = `Blocked / cancelled: ${e.message}`
      }
    })
  </script>
</body>
</html>
